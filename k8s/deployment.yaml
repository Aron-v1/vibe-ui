apiVersion: apps/v1
kind: Deployment
metadata:
  name: gov-route-library
  labels:
    app: gov-route-library
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gov-route-library
      component: frontend
  template:
    metadata:
      labels:
        app: gov-route-library
        component: frontend
    spec:
      containers:
      - name: gov-route-library
        image: gov-route-library:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: NEXT_PUBLIC_ENABLE_FILTERS
          valueFrom:
            configMapKeyRef:
              name: gov-route-library-config
              key: enable-filters
              optional: true
        - name: NEXT_PUBLIC_SEARCH_API_URL
          valueFrom:
            configMapKeyRef:
              name: gov-route-library-config
              key: search-api-url
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      securityContext:
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
